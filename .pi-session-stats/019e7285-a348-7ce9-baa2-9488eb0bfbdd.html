<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi live session stats · 019e7285-a348-7ce9-baa2-9488eb0bfbdd</title>
  <style>
    :root {
      --bg: #fafafa;
      --text: #2f3437;
      --muted: #8f8f8f;
      --soft: #b8b8b4;
      --card: #ffffff;
      --border: #eeeeec;
      --code-bg: #f4f4f2;
      --blue: #2f80ed;
      --orange: #f2994a;
      --green: #27ae60;
      --red: #eb5757;
      --purple: #9b51e0;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
      line-height: 1.55;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(1100px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: clamp(24px, 5vw, 56px);
      box-shadow: 0 12px 40px rgba(15, 15, 15, 0.04);
    }

    .hero { margin-bottom: 28px; }
    .eyebrow {
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
      max-width: 72ch;
      word-break: break-word;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .summary-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.8);
      min-height: 86px;
    }
    .summary-label {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .summary-value {
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .toolbar button {
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      font: inherit;
      cursor: pointer;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .children {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      margin-left: 4px;
    }

    .node,
    .leaf {
      position: relative;
      margin-left: 14px;
      padding-left: 22px;
      border-left: 1px solid var(--border);
    }
    .node::before,
    .leaf::before {
      content: "";
      position: absolute;
      left: -8px;
      top: 17px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: var(--role-color, var(--soft));
      box-shadow: 0 0 0 4px var(--card);
    }

    .node > summary,
    .leaf > .node-header {
      list-style: none;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.9);
    }
    .node > summary::-webkit-details-marker { display: none; }
    .node[open] > summary { border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }

    .node-body {
      border: 1px solid var(--border);
      border-top: none;
      border-bottom-left-radius: 14px;
      border-bottom-right-radius: 14px;
      padding: 14px 16px 16px;
      background: rgba(255, 255, 255, 0.78);
    }

    .node-line {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 6px;
    }
    .node-title {
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: -0.02em;
      font-weight: 600;
      text-transform: none;
      word-break: break-word;
    }
    .node-summary {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .node-preview {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .node-content {
      margin: 0 0 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: var(--code-bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    }

    .role-user { --role-color: var(--blue); }
    .role-assistant { --role-color: var(--green); }
    .role-tool { --role-color: var(--orange); }
    .role-thinking { --role-color: var(--purple); }
    .role-custom { --role-color: var(--red); }
    .role-meta { --role-color: var(--soft); }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 18px;
      color: var(--muted);
    }

    @media (max-width: 860px) {
      body { padding: 16px; }
      .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .node-line { flex-direction: column; align-items: flex-start; gap: 6px; }
      .node-summary { white-space: normal; }
    }

    @media (max-width: 560px) {
      main { padding: 20px; }
      .summary-grid { grid-template-columns: 1fr; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      .node,
      .leaf { margin-left: 8px; padding-left: 18px; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <div class="eyebrow">Pi session stats</div>
      <h1>Session timeline</h1>
      <p class="lead" id="session-meta"></p>
    </header>

    <section>
      <div class="summary-grid" id="summary-grid"></div>
    </section>

    <section>
      <div class="toolbar">
        <div id="updated-at">Waiting for data…</div>
        <button id="reload-button" type="button">Reload now</button>
      </div>
      <div class="timeline" id="timeline"></div>
    </section>
  </main>

  <script>
    const DATA_SCRIPT_PATH = './019e7285-a348-7ce9-baa2-9488eb0bfbdd.data.js';
    let currentVersion = null;

    function formatTokens(value) {
      if (value === null || value === undefined) return '?';
      if (value >= 1000000) return (value / 1000000).toFixed(value >= 10000000 ? 0 : 1) + 'M';
      if (value >= 1000) return (value / 1000).toFixed(value >= 10000 ? 0 : 1) + 'k';
      return String(value);
    }

    function formatCost(value) {
      if (value === null || value === undefined) return '?';
      if (value <= 0) return '$0.0000';
      if (value < 0.01) return '$' + value.toFixed(4);
      if (value < 10) return '$' + value.toFixed(3);
      return '$' + value.toFixed(2);
    }

    function roleClassFor(node) {
      if (node.kind === 'thinking') return 'role-thinking';
      if (node.kind === 'toolCall' || node.kind === 'toolResult') return 'role-tool';
      if (node.role === 'user') return 'role-user';
      if (node.role === 'assistant') return 'role-assistant';
      if (node.role === 'custom') return 'role-custom';
      return 'role-meta';
    }

    function collectOpenNodeIds() {
      return new Set(
        Array.from(document.querySelectorAll('details[data-node-id]'))
          .filter((details) => details.open)
          .map((details) => details.dataset.nodeId)
          .filter(Boolean)
      );
    }

    function createContentElement(node) {
      if (!node.content) return null;
      const element = document.createElement('pre');
      element.className = 'node-content';
      element.textContent = node.content;
      return element;
    }

    function createNodeHeader(node) {
      const container = document.createElement('div');

      const line = document.createElement('div');
      line.className = 'node-line';

      const title = document.createElement('div');
      title.className = 'node-title';
      title.textContent = node.label;

      const summary = document.createElement('div');
      summary.className = 'node-summary';
      summary.textContent = node.summary;

      line.appendChild(title);
      line.appendChild(summary);
      container.appendChild(line);

      if (node.preview) {
        const preview = document.createElement('div');
        preview.className = 'node-preview';
        preview.textContent = node.preview;
        container.appendChild(preview);
      }

      return container;
    }

    function createNodeElement(node, openNodeIds) {
      const className = roleClassFor(node);
      const hasChildren = node.children && node.children.length > 0;

      if (!hasChildren) {
        const leaf = document.createElement('article');
        leaf.className = 'leaf ' + className;
        leaf.appendChild(createNodeHeader(node));
        const content = createContentElement(node);
        if (content) leaf.appendChild(content);
        return leaf;
      }

      const details = document.createElement('details');
      details.className = 'node ' + className;
      details.dataset.nodeId = node.id;
      if (openNodeIds.has(node.id)) details.open = true;

      const summary = document.createElement('summary');
      summary.appendChild(createNodeHeader(node));
      details.appendChild(summary);

      const body = document.createElement('div');
      body.className = 'node-body';

      const content = createContentElement(node);
      if (content) body.appendChild(content);

      const children = document.createElement('div');
      children.className = 'children';
      for (const child of node.children) {
        children.appendChild(createNodeElement(child, openNodeIds));
      }
      body.appendChild(children);

      details.appendChild(body);
      return details;
    }

    function renderSummaryCard(label, value) {
      const card = document.createElement('article');
      card.className = 'summary-card';

      const summaryLabel = document.createElement('div');
      summaryLabel.className = 'summary-label';
      summaryLabel.textContent = label;

      const summaryValue = document.createElement('div');
      summaryValue.className = 'summary-value';
      summaryValue.textContent = value;

      card.appendChild(summaryLabel);
      card.appendChild(summaryValue);
      return card;
    }

    function render(data) {
      const openNodeIds = collectOpenNodeIds();

      const sessionMeta = document.getElementById('session-meta');
      sessionMeta.textContent = data.session.cwd + ' · ' + data.session.id + (data.session.file ? ' · ' + data.session.file : '');

      const summaryGrid = document.getElementById('summary-grid');
      summaryGrid.innerHTML = '';
      const summaryCards = [
        ['messages', String(data.totals.messageCount)],
        ['user', String(data.totals.userMessageCount)],
        ['assistant', String(data.totals.assistantMessageCount)],
        ['tool results', String(data.totals.toolResultMessageCount)],
        ['non-assistant est', formatTokens(data.totals.estimatedNonAssistantTokens) + ' tok'],
        ['assistant input', formatTokens(data.totals.assistantInputTokens)],
        ['assistant output', formatTokens(data.totals.assistantOutputTokens)],
        ['assistant cost', formatCost(data.totals.assistantCost)]
      ];
      for (const card of summaryCards) {
        summaryGrid.appendChild(renderSummaryCard(card[0], card[1]));
      }

      const updatedAt = document.getElementById('updated-at');
      const lastSummary = data.lastMessageSummary
        ? 'last ' + data.lastMessageSummary.label + ' · ' + data.lastMessageSummary.summary
        : 'no finalized messages yet';
      updatedAt.textContent = new Date(data.updatedAt).toLocaleString() + ' · ' + lastSummary;

      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';
      if (!data.timeline || data.timeline.length === 0) {
        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.textContent = 'No session messages yet.';
        timeline.appendChild(emptyState);
        return;
      }

      for (const node of data.timeline) {
        timeline.appendChild(createNodeElement(node, openNodeIds));
      }
    }

    function loadDataScript() {
      return new Promise((resolve, reject) => {
        delete window.__LIVE_SESSION_STATS__;
        const previousScript = document.getElementById('live-session-stats-data-script');
        if (previousScript) previousScript.remove();

        const script = document.createElement('script');
        script.id = 'live-session-stats-data-script';
        script.async = true;
        script.src = DATA_SCRIPT_PATH + '?t=' + Date.now();
        script.onload = function () {
          resolve(window.__LIVE_SESSION_STATS__ || null);
        };
        script.onerror = function () {
          reject(new Error('Failed to load session stats data script.'));
        };
        document.body.appendChild(script);
      });
    }

    async function refresh() {
      try {
        const data = await loadDataScript();
        if (!data) return;
        if (data.version === currentVersion) return;
        currentVersion = data.version;
        render(data);
      } catch (error) {
        const updatedAt = document.getElementById('updated-at');
        updatedAt.textContent = error instanceof Error ? error.message : String(error);
      }
    }

    document.getElementById('reload-button').addEventListener('click', function () {
      void refresh();
    });

    void refresh();
    window.setInterval(function () {
      void refresh();
    }, 1500);
  </script>
</body>
</html>
